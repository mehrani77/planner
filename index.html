<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>برنامه‌ریزی محمد</title>
<style>
    body {
        font-family: sans-serif;
        background: #fff;
        margin: 0;
        padding: 20px;
        color: #000;
    }

    .header {
        text-align: center;
        margin-bottom: 25px;
    }
    .header h1 {
        font-size: 28px;
        margin: 0;
        font-weight: bold;
    }
    .header h2 {
        font-size: 14px;
        margin-top: 5px;
        color: #444;
    }

    .selectors {
        text-align: center;
        margin-bottom: 25px;
    }
    select {
        padding: 10px;
        margin: 5px;
        width: 180px;
        border: 1px solid #aaa;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
    }

    .section-title {
        font-size: 18px;
        margin-top: 25px;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .task-input {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }
    .task-input input {
        flex: 1;
        padding: 10px;
        border: 1px solid #aaa;
        border-radius: 8px;
    }
    .task-input button {
        padding: 10px 15px;
        background: #4da3ff;
        border: none;
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
    }

    .task-list div {
        background: #f5f5f5;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .task-list button {
        background: red;
        color: #fff;
        border: none;
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
    }

    .habit {
        display: flex;
        align-items: center;
        background: #f5f5f5;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 8px;
    }
    .habit input[type="text"] {
        flex: 1;
        padding: 8px;
        border: 1px solid #aaa;
        border-radius: 6px;
        margin-left: 10px;
    }
</style>
</head>

<body>

<div class="header">
    <h1>برنامه‌ریزی محمد</h1>
    <h2>Mohammad Mehrani</h2>
</div>

<div class="selectors">
    <select id="month">
        <option>ماه اول</option>
        <option>ماه دوم</option>
        <option>ماه سوم</option>
    </select>

    <select id="week">
        <option>هفته ۱</option>
        <option>هفته ۲</option>
        <option>هفته ۳</option>
        <option>هفته ۴</option>
    </select>
</div>

<div class="section-title">کارهای اصلی امروز</div>

<div class="task-input">
    <input id="taskInput" type="text" placeholder="کار جدید...">
    <button onclick="addTask()">افزودن</button>
</div>

<div class="task-list" id="taskList">
    <div>
        <span>استوک مهاباد</span>
        <button onclick="this.parentElement.remove()">حذف</button>
    </div>
</div>

<div class="section-title">عادت‌ها</div>

<div class="habit">
    <input type="checkbox">
    <input type="text" value="خواب">
</div>

<div class="habit">
    <input type="checkbox">
    <input type="text" value="ورزش">
</div>

<div class="habit">
    <input type="checkbox">
    <input type="text" value="مطالعه">
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    if (input.value.trim() === "") return;

    let list = document.getElementById("taskList");

    let item = document.createElement("div");
    item.innerHTML = `
        <span>${input.value}</span>
        <button onclick="this.parentElement.remove()">حذف</button>
    `;

    list.appendChild(item);
    input.value = "";
}
</script>

</body>
</html>
